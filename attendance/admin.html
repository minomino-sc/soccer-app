<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛠 管理画面</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
  background:#f5f7fb;
  padding:16px;
}

h1{margin:0 0 12px}
h2{margin:28px 0 8px}

label{
  display:block;
  margin-top:12px;
  font-size:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  margin-top:20px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:600;
}

.msg{
  margin-top:8px;
  font-size:14px;
}

/* ===== 対象チーム ===== */
.teamWrap{
  margin-top:8px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.teamItem{
  border:2px solid #ddd;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  font-size:15px;
  background:#fff;
}

.teamItem input{
  display:none;
}

.teamItem span{
  display:block;
}

/* 選択中 */
.teamItem input:checked + span{
  color:#2563eb;
  font-weight:700;
}

.teamItem input:checked + span::before{
  content:"✔ ";
}

/* ===== 部員一覧 ===== */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:12px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{background:#eee}
</style>
</head>

<body>

<h1>🛠 管理画面</h1>

<!-- イベント登録 -->
<h2>📅 イベント登録</h2>

<label>日付
  <input type="date" id="evDate">
</label>

<label>種別
  <select id="evType">
    <option value="practice">サッカー練習</option>
    <option value="match">サッカー試合</option>
    <option value="futsal_practice">フットサル練習</option>
    <option value="futsal_match">フットサル試合</option>
  </select>
</label>

<label>タイトル
  <input type="text" id="evTitle" placeholder="例：通常練習 / リーグ戦">
</label>

<label>対象チーム</label>
<div class="teamWrap">
  <label class="teamItem">
    <input type="radio" name="team" value="A">
    <span>箕谷 A</span>
  </label>
  <label class="teamItem">
    <input type="radio" name="team" value="B">
    <span>箕谷 B</span>
  </label>
  <label class="teamItem">
    <input type="radio" name="team" value="AB">
    <span>A・B 両方</span>
  </label>
</div>

<button id="saveEvent">イベント登録</button>
<div class="msg" id="evMsg"></div>

<!-- 部員登録 -->
<h2>👥 部員登録</h2>

<label>背番号
  <input type="number" id="plNumber">
</label>

<label>名前
  <input type="text" id="plName">
</label>

<button id="savePlayer">部員登録</button>
<div class="msg" id="plMsg"></div>

<!-- 部員一覧 -->
<h2>📋 登録済み部員（背番号順）</h2>
<table>
  <thead>
    <tr>
      <th>背番号</th>
      <th>名前</th>
    </tr>
  </thead>
  <tbody id="playerList"></tbody>
</table>

<script type="module" src="admin.js"></script>
</body>
</html>
