<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚽ 出欠管理</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --barca-blue:#0a1a3a;
  --barca-red:#8b1538;
  --barca-light:#f4f6fa;
  --no-width:40px;
}

/* ===== 全体 ===== */
body{
  margin:0;
  padding:12px;
  font-family:"M PLUS Rounded 1c",system-ui,sans-serif;
  background:#0a1a3a;
  color:#fff;
  font-size:12px;
}
h1{ margin:0 0 6px; font-size:18px; }

/* ===== 操作部 ===== */
.controls{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
}
button{
  background:#cde8d6;
  color:#000;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}

/* ===== 凡例 ===== */
.legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  font-size:11px;
  margin-bottom:8px;
}

/* ===== テーブル ===== */
.tableWrap{
  overflow-x:auto;
  position:relative;
}
table{
  border-collapse:separate;
  border-spacing:0;
  width:max-content;
  background:var(--barca-light);
  color:#222;
  font-size:12px;
}

/* 共通セル */
th,td{
  border:1px solid #ddd;
  padding:4px 6px;
  text-align:center;
  white-space:nowrap;
}

/* ===== ヘッダー ===== */
th{
  background:linear-gradient(135deg,var(--barca-blue),var(--barca-red));
  color:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

/* ===== 背番号・名前 ===== */
th.no{
  position:sticky;
  left:0;
  z-index:30;
  width:36px;
}
th.name{
  position:sticky;
  left:var(--no-width);
  z-index:29;
}
td.no{
  position:sticky;
  left:0;
  background:#f0f0f0;
  color:#000;
  z-index:20;
  width:36px;
}
td.name{
  position:sticky;
  left:var(--no-width);
  background:#f0f0f0;
  color:#000;
  z-index:19;
  width:auto;
  padding-left:4px;
  text-align:center;
}
  
/* ===== 出欠セル ===== */
td.practice{ background:#fff; }
td.match{ background:#fbeaec; }
td.practice:hover,
td.match:hover{
  background:#f5c542;
  cursor:pointer;
}
td.futsal_practice{ background:#efe6ff; }
td.futsal_match{ background:#ffd6f5; }

td.futsal_practice:hover,
td.futsal_match:hover{
  background:#c084fc;
  cursor:pointer;
}
 
/* ===== 出席率 ===== */
h2{
  font-size:15px;
  margin:12px 0 6px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
}
.statsCard{
  background:linear-gradient(135deg,var(--barca-red),var(--barca-blue));
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

/* ===== PDF専用 ===== */
#pdfCover{
  position:relative;
  padding:24px 16px 12px;
  text-align:center;
  background:#fff;
  color:#000;
}

#pdfCover::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("./IMG_2508.jpeg") center/240px no-repeat;
  opacity:0.12;
  pointer-events:none;
}

#pdfCover h1{ font-size:24px; margin:0 0 6px; }
#pdfCover h2{ font-size:16px; margin:0 0 10px; }
#pdfCover p{ font-size:13px; margin:2px 0; }

.pdf-note{
  margin-top:10px;
  font-size:11px;
  color:#555;
  border-top:1px solid #ccc;
  padding-top:6px;
}

/* ===== チーム表示色 ===== */
.teamA{
  color:#1e5bff;
  font-weight:700;
}

.teamB{
  color:#d00000;
  font-weight:700;
}

</style>
</head>

<body>

<h1>⚽ 出欠管理</h1>

<!-- 親システムに戻るボタン -->
<button id="backBtn" style="display:none; margin-bottom:12px;">← 戻る</button>
  
<div class="controls">
  <button id="prevMonth">◀</button>
  <strong id="monthLabel"></strong>
  <button id="nextMonth">▶</button>
  <button onclick="exportCSV()">CSV出力</button>
  <button id="exportMonthlyPdf">📘 月まとめPDF</button>
  <button id="exportYearPdf">📙 年まとめPDF</button>
</div>

<div class="legend">
  <div>
    <span>○ 出席</span>
    <span>× 欠席</span>
    <span>－ 対象外</span>
    <span>※ トレセン（出席率対象外）</span>
    <span>◻︎ 学校行事（出席率対象外）</span>
  </div>

  <div>
    <span>🥅＝フットサル</span>
    <span>試＝試合</span>
    <span>練＝練習</span>
  </div>
</div>

<div class="tableWrap">
  <table id="table"></table>
</div>

<h2>📊 出席率</h2>
<div id="statsPdfArea">
  <div id="stats" class="stats"></div>
</div>

<script type="module" src="./main.js"></script>

<script>
function fixStickyWidths(){
  const no = document.querySelector("th.no");
  if(!no) return;
  document.documentElement.style.setProperty(
    "--no-width",
    no.getBoundingClientRect().width + "px"
  );
}
new MutationObserver(fixStickyWidths)
  .observe(document.getElementById("table"), { childList:true });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
document.getElementById("exportMonthlyPdf").addEventListener("click", () => {
  if (!window.monthTeamSummary) {
    alert("集計データがまだありません");
    return;
  }

  const s = window.monthTeamSummary;
  const monthText = document.getElementById("monthLabel").textContent;
  const stats = document.getElementById("stats");
  const cards = stats.querySelectorAll(".statsCard");

  const cover = document.createElement("div");
  cover.id = "pdfCover";
  cover.innerHTML = `
    <h1>⚽ 箕谷サッカークラブ</h1>
    <h2>${monthText} 出席率まとめ</h2>
    <p>対象人数：${cards.length} 名</p>
    <p><strong>練習回数</strong><br>
      箕谷A：${s.A.practice} 回 ／ 箕谷B：${s.B.practice} 回
    </p>
    <p><strong>試合回数</strong><br>
      箕谷A：${s.A.match} 回 ／ 箕谷B：${s.B.match} 回
    </p>
    <p>作成日：${new Date().toLocaleDateString("ja-JP")}</p>
    <div class="pdf-note">
      ※ トレセン・学校行事は出席率の算出対象外です
    </div>
  `;

  const wrapper = document.createElement("div");
  wrapper.appendChild(cover);
  wrapper.appendChild(document.getElementById("statsPdfArea").cloneNode(true));

  html2pdf()
    .set({
      margin:[8,8,10,8],
      filename:`${monthText}_出席率まとめ.pdf`,
      html2canvas:{ scale:2 },
      jsPDF:{ unit:"mm", format:"a4", orientation:"portrait" }
    })
    .from(wrapper)
    .save();
});
</script>

<!-- ↓↓↓ ここに追加 ↓↓↓ -->
<script>
document.getElementById("exportYearPdf").addEventListener("click", async () => {

  const from = prompt("開始年月（例：2026-01）");
  const to   = prompt("終了年月（例：2026-12）");

  if (!from || !to) return;

/* ★ここ追加 */
if (!window.events || window.events.length === 0) {
  alert("データ読込中です。少し待ってから再実行してください");
  return;
}

/* ★ここ修正 */
const fromDate = new Date(from + "-01T00:00:00");

const toTmp = new Date(to + "-01T00:00:00");
const toDate = new Date(toTmp.getFullYear(), toTmp.getMonth() + 1, 0);

/* そのまま */
const yearEvents = window.events.filter(e =>
  e._date && e._date >= fromDate && e._date <= toDate
);
  
  if (yearEvents.length === 0) {
    alert("対象データがありません");
    return;
  }

/* ★ここに追加（ログ取得） */
const snap = await getDocs(collection(db, "attendance_logs"));

const logsCache = {};

snap.forEach(doc => {
  const d = doc.data();
  const key = `${d.eventId}_${d.playerId}`;
  const t = d.createdAt?.toMillis?.() ?? 0;

  if (!logsCache[key] || t > logsCache[key].time) {
    logsCache[key] = { status: d.status, time: t };
  }
});

/* ↓このあとに summary や 個人成績 */
const statsData = [];

window.players.forEach(p => {

  let prH = 0, prT = 0, maH = 0, maT = 0;

  yearEvents.forEach(e => {
    const key = `${e.id}_${p.id}`;
    const s = logsCache[key]?.status;

    if (!s || s === "skip") return;

    const isCount = (s === "present");

    if (e.type === "practice" || e.type === "futsal_practice") {
      if (s !== "special" && s !== "school") prT++;
      if (isCount) prH++;
    }

    if (e.type === "match" || e.type === "futsal_match") {
      if (s !== "special" && s !== "school") maT++;
      if (isCount) maH++;
    }
  });

  statsData.push({
    name: p.name,
    prH, prT, maH, maT
  });
});
  
  const summary = {
    A: { practice: 0, match: 0 },
    B: { practice: 0, match: 0 }
  };

  yearEvents.forEach(e => {
    let teams = [];

    if (Array.isArray(e.targetTeams)) {
      teams = e.targetTeams;
    } else if (typeof e.targetTeam === "string") {
      teams = [e.targetTeam];
    }

    teams.forEach(t => {
      if (!summary[t]) return;

      if (e.type === "practice" || e.type === "futsal_practice") {
        summary[t].practice++;
      }

      if (e.type === "match" || e.type === "futsal_match") {
        summary[t].match++;
      }
    });
  });

  const cover = document.createElement("div");
  cover.id = "pdfCover";
  cover.innerHTML = `
    <h1>⚽ 箕谷サッカークラブ</h1>
    <h2>${from} 〜 ${to} 出席率まとめ</h2>
    <p><strong>練習回数</strong><br>
      箕谷A：${summary.A.practice} 回 ／ 箕谷B：${summary.B.practice} 回
    </p>
    <p><strong>試合回数</strong><br>
      箕谷A：${summary.A.match} 回 ／ 箕谷B：${summary.B.match} 回
    </p>
    <p>作成日：${new Date().toLocaleDateString("ja-JP")}</p>
  `;

  const wrapper = document.createElement("div");
  wrapper.appendChild(cover);
  wrapper.appendChild(document.getElementById("statsPdfArea").cloneNode(true));

  html2pdf()
    .set({
      margin:[8,8,10,8],
      filename:`${from}_${to}_出席率まとめ.pdf`,
      html2canvas:{ scale:2 },
      jsPDF:{ unit:"mm", format:"a4", orientation:"portrait" }
    })
    .from(wrapper)
    .save();
});
</script>
  
</body>
</html>
