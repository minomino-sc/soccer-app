<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>年間スケジュール</title>
<link rel="stylesheet" href="styles.css">

<style>
body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
h1 { white-space: nowrap; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.weekday-header { font-weight: bold; text-align: center; }
.sunday { color: red; }
.saturday { color: blue; }
.day { border: 1px solid #ccc; min-height: 45px; text-align: center; padding-top: 4px; background: #fff; cursor: pointer; }
.holiday { color: orange; }
.label { font-size: 16px; line-height: 1; }

#eventPopup{
  position: fixed;
  top: 50%;
  left: 20px;
  transform: translateY(-50%);
  background:#fff;
  border:1px solid #666;
  padding:10px;
  border-radius:6px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  display:none;
  max-width:300px;
  max-height:400px;
  overflow-y:auto;
  z-index:1000;
}
</style>
</head>

<body>
  
<div class="header-fixed">

  <h1>📅 2026年度 年間スケジュール</h1>

  <!-- 親システムに戻るボタン -->
  <button id="backBtn" style="display:none; margin-bottom:12px;">← 戻る</button>

  <button onclick="toggleAdmin()">管理者モード</button>

  <div id="adminPanel" style="display:none; margin:15px 0;">
    <input type="date" id="adminDate">
    <select id="adminTeam">
      <option value="A">チームA</option>
      <option value="B">チームB</option>
      <option value="AB">チームA/B</option>
      <option value="Z">その他</option>
    </select>

    <select id="adminType">
      <option value="practice">練習</option>
      <option value="official">公式戦</option>
      <option value="cup">カップ戦</option>
      <option value="friendly">交流戦</option>
      <option value="etc">その他</option>
    </select>

    <input type="text" id="adminText" placeholder="内容">
    <input type="text" id="adminLocation" placeholder="場所（例：〇〇グラウンド）">
    <input type="text" id="adminTime" placeholder="時間（例：18:00〜20:00）">
    <input type="text" id="adminFileUrl" placeholder="資料URL（Googleドライブ）">
    <button onclick="addEvent()">追加</button>
  </div>

  <div id="calendarLegend">
    <span>🟢練習</span>
    <span>🔵公式戦</span>
    <span>🟡カップ戦</span>
    <span>🟣交流戦</span>
    <span>🔴その他</span>
  </div>

</div> <!-- ← ここで閉じる -->

<div id="calendarContainer"></div>
<div id="eventPopup"></div>
  
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</body>
</html>
