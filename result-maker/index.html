<!doctype html>
<html lang="ja">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>試合結果</title>

<style>

body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  padding:20px;
  font-family:sans-serif;
}

#poster{
  width:1080px;
  height:1350px;

  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.bg{
  width:100%;
  height:100%;
  object-fit:cover;

  position:absolute;
  inset:0;
  z-index:0;
}

.title{
  color:white;
  font-size:120px;
  font-weight:bold;
  text-align:center;
  margin-top:100px;

  position:relative;
  z-index:1;
}

.score{
  color:#fff;
  font-size:220px;
  font-weight:bold;
  text-align:center;
  margin-top:80px;

  position:relative;
  z-index:1;
}

.win{
  color:gold;
  font-size:140px;
  font-weight:bold;
  text-align:center;
  transform:rotate(-8deg);
  margin-top:30px;

  position:relative;
  z-index:1;
}

</style>
</head>

<body>

<div id="poster">

<img
src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1200"
class="bg"
>

<div class="title">
試合結果
</div>

<div class="score">
1-0
</div>

<div class="win">
WIN!
</div>

</div>

</body>
</html>
