<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>試合結果ポスター</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="poster">

  <!-- テンプレ背景 -->
  <img
    src="assets/template.PNG"
    id="template"
  >
  
  <!-- 装飾レイヤー（ここを追加） -->
  <div id="brush-blue"></div>
  <div id="white-light"></div>
  <div id="gradient"></div>

  <!-- 上部写真 -->
  <img
    src="assets/IMG_4575.jpeg"
    class="top-photo"
  >

  <!-- エンブレム -->
  <img
    src="assets/IMG_2508.jpeg"
    class="logo"
  >

  <!-- 大会名 -->
  <div id="red-bar">
    神戸市北地区1A
  </div>

  <!-- タイトル -->
  <div class="title">
    試合結果
  </div>

  <!-- 日付 -->
  <div class="date">
    5/17 SUN
  </div>

  <!-- VS -->
  <div class="vs-label">
    VS
  </div>

  <!-- 相手 -->
  <div class="opponent">
    夢野の丘SC-B
  </div>

  <!-- 勝敗 -->
  <div class="result win">
    WIN!
  </div>

  <!-- スコア -->
  <div class="score">
    1-0
  </div>

  <!-- 円陣写真 -->
  <img
    src="assets/IMG_4994.jpeg"
    class="bottom-photo"
  >

  <!-- 得点者 -->
  <div class="scorer">
    得点者　リョウタ ×1
  </div>

  <!-- 通算成績 -->
  <div class="record">
    5勝3敗
  </div>

</div>

</body>
</html>
