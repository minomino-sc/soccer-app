<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>試合結果ポスター</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="poster">

  <!-- 上部 -->
  <div class="top-area">

    <img
      src="assets/IMG_4575.jpeg"
      class="top-photo"
    >

    <img
      src="assets/IMG_2508.jpeg"
      class="logo"
    >

    <div class="tournament">
      神戸市北地区1A
    </div>

    <div class="date">
      5/17 SUN
    </div>

  </div>

  <!-- 中央 -->
  <div class="center-area">

    <div class="title">
      試合結果
    </div>

    <div class="vs-label">
      VS
    </div>

    <div class="opponent">
      夢野の丘SC-B
    </div>

    <div class="result win">
      WIN!
    </div>

    <div class="score">
      1-0
    </div>

  </div>

  <!-- 下部 -->
  <div class="bottom-area">

    <img
      src="assets/IMG_4994.jpeg"
      class="bottom-photo"
    >

    <div class="info-box">

      <div class="scorer">
        得点者　リョウタ
      </div>

      <div class="record">
        通算成績　5勝3敗
      </div>

    </div>

  </div>

</div>

<script src="main.js"></script>

</body>
</html>
