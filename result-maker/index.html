<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>試合結果ポスター</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="poster">

  <!-- テンプレ背景 -->
  <img
    src="assets/template.PNG"
    id="template"
  >
  
  <!-- 上部写真 -->
  <img
    src="assets/IMG_4575.jpeg"
    class="top-photo"
  >

  <!-- 日付 -->
  <div class="date">
    5/17<br>SUN
  </div>

  <!-- 相手 -->
  <div class="opponent">
    夢野の丘SC-B
  </div>

  <!-- 勝敗 -->
  <div class="result win">
    WIN!
  </div>

<!-- 大会名 -->
<div class="tournament">
  交流戦
</div>
  
  <!-- スコア -->
  <div class="score">
    1 0
  </div>

  <!-- 円陣写真 -->
  <img
    src="assets/IMG_4994.jpeg"
    class="bottom-photo"
  >

  <!-- 得点者 -->
  <div class="scorer">
    ⚽️リョウタ ×1
  </div>

  <!-- 通算成績 -->
  <div class="record">
    5勝3敗
  </div>

</div>

</body>
</html>
